    icon: mdi:music-note
    web_server:
      sorting_group_id: alarm_config
  
  - platform: template
    name: "Display font"
    min_value: 0
    max_value: 2
    step: 1
    mode: slider
    restore_value: True
    initial_value: 0
    entity_category: config
    id: displayfont
    optimistic: True
    icon: mdi:format-font
    web_server:
      sorting_group_id: alarm_config

    
# Use the spleen font dor alarm time display als it allows for 6 characters
# Use matrix font for time. Only 5 characters in display, full height of display is used.
font:
  - file: "https://raw.githubusercontent.com/lancer73/ESPHome-Alarm-Clock/main/MatrixFont-5x8.bdf"
    id: digit_font
    size: 8
  - file: "https://raw.githubusercontent.com/lancer73/ESPHome-Alarm-Clock/main/MatrixFont-6x8.bdf"
    id: matrix_font
  - file: "https://raw.githubusercontent.com/lancer73/ESPHome-Alarm-Clock/main/Segment-6x8.bdf"
    id: segment_font
  - file: "https://raw.githubusercontent.com/lancer73/ESPHome-Alarm-Clock/main/Aurebesh-6x8.bdf"
    id: aurebesh_font

display:
  - platform: max7219digit
    cs_pin: ${dispcspin}
    num_chips: 4
    rotate_chip: ${chip_orient}
    reverse_enable: ${reverse_enable}
    intensity: 15
    lambda: |-
      char alarm_day[]="${weekdays}";
      auto time = id(esptime).now();
      int thisday = (id(disp_line) + time.day_of_week - 2) % 7;

      if (id(display_state).state) {
        it.turn_on_off(true);
        it.intensity(id(disp_brightness));
        if (id(alarm_state).state || id(alert_now).state) {
          it.invert_on_off(true);
        } else {
          it.invert_on_off(false);
        }

        switch(id(disp_line)) {
        case 0:
        #ifdef HAS_LED
          it.printf(16, 0, id(matrix_font), TextAlign::TOP_CENTER, "%2d:%02d", time.hour, time.minute);
        #else
          if (id(next_alarm) < 2880 || id(message_state)) {
            switch((int)id(displayfont).state) {
            case 1:
              it.printf(0, 0, id(segment_font), TextAlign::TOP_LEFT, "%2d:%02d", time.hour, time.minute);
              break;
            case 2:
              it.printf(0, 0, id(aurebesh_font), TextAlign::TOP_LEFT, "%2d:%02d", time.hour, time.minute);
              break;
            default:
              it.printf(0, 0, id(matrix_font), TextAlign::TOP_LEFT, "%2d:%02d", time.hour, time.minute);
              break;
            }
            if(id(next_alarm) < 2880) {
              it.line(31,0,31,0);
            }
            if (id(message_state)) {
              it.line(31,7,31,7);
            }
          } else {
            it.printf(16, 0, id(matrix_font), TextAlign::TOP_CENTER, "%2d:%02d", time.hour, time.minute);
          }
        #endif
          break;
        case 1:
        #ifdef HAS_TVOC
          switch((int)id(displayfont).state) {
          case 1:
            it.printf(0, 0, id(segment_font), TextAlign::TOP_LEFT, " %s >%.0f°c voc %.0fppb", id(message_line).state.c_str(), id(temperature).state, id(tvoc).state);
            break;
          case 2:
            it.printf(0, 0, id(aurebesh_font), TextAlign::TOP_LEFT, " %s >%.0f°c voc %.0fppb", id(message_line).state.c_str(), id(temperature).state, id(tvoc).state);
            break;
          default:
            it.printf(0, 0, id(matrix_font), TextAlign::TOP_LEFT, " %s >%.0f°c voc %.0fppb", id(message_line).state.c_str(), id(temperature).state, id(tvoc).state);
            break;
          }
        #else
          switch((int)id(displayfont).state) {
          case 1:
            it.printf(0, 0, id(segment_font), TextAlign::TOP_LEFT, " %s", id(message_line).state.c_str());
            break;
          case 2:
            it.printf(0, 0, id(aurebesh_font), TextAlign::TOP_LEFT, " %s", id(message_line).state.c_str());
            break;
          default:
            it.printf(0, 0, id(matrix_font), TextAlign::TOP_LEFT, " %s", id(message_line).state.c_str());
            break;
          }
        #endif
          break;
        case 100:
          if (id(wifi_enabled)) {
            it.printf(0, 0, id(digit_font), TextAlign::TOP_LEFT, " %s", id(ip_address)[0].state.c_str());
          } else {
            it.print(16, 0, id(digit_font), TextAlign::TOP_CENTER, "Wifi");
            it.line(0,7,31,0);
          }
          break;
        case 101:
        #ifndef HAS_LED
          if (id(time_changed)) {
            it.line(31,0,31,0);
          } 
        #endif
          it.print(0,0, id(digit_font), TextAlign::TOP_LEFT, "St");
          it.printf(11,0, id(digit_font), TextAlign::TOP_LEFT, "%2d%02d", (int)id(current_hour),(int)id(current_minute));
          break;
        case 102:
        #ifndef HAS_LED
          if (id(time_changed)) {
            it.line(31,0,31,0);
          } 
        #endif
          it.print(0, 0, id(digit_font), TextAlign::TOP_LEFT, "Sy");
          it.printf(11, 0, id(digit_font), TextAlign::TOP_LEFT, "%4d", (int)id(current_year));
          break;
        case 103:
        #ifndef HAS_LED
          if (id(time_changed)) {
            it.line(31,0,31,0);
          } 
        #endif
          it.print(0, 0, id(digit_font), TextAlign::TOP_LEFT, "Sd");
          it.printf(11, 0, id(digit_font), TextAlign::TOP_LEFT, "%2d%2d", (int)id(current_day), (int)id(current_month));
          break;
        case 104:
        #ifndef HAS_LED
          if (id(display_onoff).state) {
            it.line(31,0,31,0);
          }
        #endif
          it.print(0, 0, id(digit_font), TextAlign::TOP_LEFT, "On");
          it.printf(11, 0, id(digit_font), TextAlign::TOP_LEFT, "%2d%02d",(int)id(display_onoff_hour)[0], (int)id(display_onoff_minute)[0]);
          break;
        case 105:
        #ifndef HAS_LED
          if (id(display_onoff).state) {
            it.line(31,0,31,0);
          }
        #endif
          it.print(0, 0, id(digit_font), TextAlign::TOP_LEFT, "Of");
          it.printf(11, 0, id(digit_font), TextAlign::TOP_LEFT, "%2d%02d",(int)id(display_onoff_hour)[1], (int)id(display_onoff_minute)[1]);
          break;
        case 106:
        #ifndef HAS_LED
          if (id(display_onoff).state) {
            it.line(31,0,31,0);
          }
        #endif
          it.printf(0, 0, id(digit_font), TextAlign::TOP_LEFT, "Dt %2ds", (int)id(disp_return).state);
          break;
        case 107:
        #ifndef HAS_LED
          if (id(display_onoff).state) {
            it.line(31,0,31,0);
          }
        #endif
          it.printf(0, 0, id(digit_font), TextAlign::TOP_LEFT, "Db %2dm", (int)id(on_before).state);
          break;
        case 108:
        #ifndef HAS_LED
          if (id(display_onoff).state) {
            it.line(31,0,31,0);
          }
        #endif
          it.printf(0, 0, id(digit_font), TextAlign::TOP_LEFT, "Da %2dm", (int)id(off_after).state);
          break;
        case 109:
          switch((int)id(displayfont).state) {
          case 1:
            it.print(0, 0, id(digit_font), TextAlign::TOP_LEFT, "Df Segment,");
            break;          
          case 2:
            it.print(0, 0, id(digit_font), TextAlign::TOP_LEFT, "Df Aurebesh,");
            break;
          default:
            it.print(0, 0, id(digit_font), TextAlign::TOP_LEFT, "Df Normal,");
            break;
          }
          break;
        case 110:
        #ifndef HAS_LED
          if (id(alarm_buzzer).state) {
            it.line(31,0,31,0);
          }
        #endif
          it.printf(0, 0, id(digit_font), TextAlign::TOP_LEFT, "At %2dm", (int)id(alarm_off).state);
          break;
        case 111:
          switch((int)id(mymelody).state) {
          case 0:
            it.print(0, 0, id(digit_font), TextAlign::TOP_LEFT, "Star Wars,");
            break;
          case 1:
            it.print(0, 0, id(digit_font), TextAlign::TOP_LEFT, "Mission Impossible,");
            break;          
          case 2:
            it.print(0, 0, id(digit_font), TextAlign::TOP_LEFT, "Mario Kart,");
            break;
          case 3:
            it.print(0, 0, id(digit_font), TextAlign::TOP_LEFT, "Addams Family,");
            break;
          case 4:
            it.print(0, 0, id(digit_font), TextAlign::TOP_LEFT, "Airwolf,");
            break;
          case 5:
            it.print(0, 0, id(digit_font), TextAlign::TOP_LEFT, "James Bond,");
            break;
          case 6:
            it.print(0, 0, id(digit_font), TextAlign::TOP_LEFT, "Swiebertje,");
            break;
          case 7:
            it.print(0, 0, id(digit_font), TextAlign::TOP_LEFT, "Friends,");
            break;          
          default:
            it.print(0, 0, id(digit_font), TextAlign::TOP_LEFT, "Wake Me Up,");
            break;
          }
          break;
        default:
          it.printf(0,0, id(digit_font), TextAlign::TOP_LEFT, "%c%c", alarm_day[thisday * 2], alarm_day[(thisday * 2) + 1]);
          it.printf(11,0, id(digit_font), TextAlign::TOP_LEFT, "%2d%02d", (int)id(alarm_hour)[thisday],(int)id(alarm_minute)[thisday]);
        #ifndef HAS_LED
          if (id(alarm_on)[thisday]) {
            it.line(31,0,31,0);
          }
          if (id(alarm_on_once)[thisday]) {
            it.line(31,2,31,2);
          }
        #endif
          break;
        }
      } else {
        it.turn_on_off(false);
      }

