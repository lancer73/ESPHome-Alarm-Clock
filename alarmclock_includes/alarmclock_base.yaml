button:
  - platform: restart
    name: Restart
    id: reboot
    web_server:
      sorting_group_id: alarm_control

  - platform: template
    name: Toggle all alarms off
    id: toggle_all_off
    icon: mdi:alarm-off
    on_press:
      - lambda: |-
          for (int i = 0; i <= 6; i++) {
            id(alarm_on)[i] = false;
            id(alarm_on_once)[i] = false;
          }
    web_server:
      sorting_weight: 5
      sorting_group_id: alarm_time

  - platform: template
    name: Toggle weekday alarms on
    id: toggle_all_on
    icon: mdi:alarm-multiple
    on_press:
      - lambda: |-
          for (int i = 1; i <= 5; i++) {
            id(alarm_on)[i] = true;
          }
    web_server:
      sorting_weight: 6
      sorting_group_id: alarm_time

  - platform: template
    name: Recalculate
    id: recalculate
    internal: True
    on_press: 
      then:
        - lambda: |-
            auto time = id(esptime).now();
            int thisday = (time.day_of_week - 1);
            int nowmin = (time.hour * 60) + time.minute;
            int alarmtoday = (id(alarm_hour)[thisday] * 60) + id(alarm_minute)[thisday];
            int alarmtomorrow = 1440 + (id(alarm_hour)[time.day_of_week % 7] * 60) + id(alarm_minute)[time.day_of_week % 7];
            int onat = (id(display_onoff_hour)[0] * 60) + id(display_onoff_minute)[0];
            int offat = (id(display_onoff_hour)[1] * 60) + id(display_onoff_minute)[1];

            if (nowmin < offat && nowmin >= onat) {
              id(offperiod) = false;
            } else {
              id(offperiod) = true;
            }

            if ((alarmtoday - nowmin) >= 0 && id(alarm_on)[thisday]) {
              id(next_alarm) = alarmtoday - nowmin;
            } else if (id(alarm_on)[time.day_of_week % 7]) {
              id(next_alarm) = alarmtomorrow - nowmin;
            } else {
              id(next_alarm) = 2880;
            }

switch:
  - platform: template
    name: "Up⁄Down toggles display"
    id: updown_onoff
    optimistic: True
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    web_server:
      sorting_group_id: alarm_config

  - platform: template
    name: "Automatic display on⁄off"
    optimistic: True
    id: display_onoff
    entity_category: config
    icon: mdi:monitor
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      then:
        - button.press:
            id: recalculate 
    on_turn_off:
      then:
        - button.press:
            id: recalculate 
    web_server:
      sorting_weight: 12
      sorting_group_id: alarm_config

  - platform: template
    name: "Display Aan⁄Uit"
    id: display_state
    optimistic: True
    restore_mode: ALWAYS_ON
    icon: mdi:monitor
    on_turn_on:
      then:
        - globals.set: 
            id: disp_timeout
            value: '0'
    web_server:
      sorting_group_id: alarm_control

  - platform: template
    name: "Alarm"
    id: alarm_state
    icon: mdi:bell-ring
    optimistic: True
    restore_mode: ALWAYS_OFF
    on_turn_on:
      then:
        - switch.turn_on: display_state
        - globals.set: 
            id: alarm_timeout
            value: '0'
    on_turn_off:
      then:
        - rtttl.stop
    web_server:
      sorting_group_id: alarm_control

  - platform: template
    name: "Alert now"
    id: alert_now
    icon: mdi:bell-ring
    optimistic: True
    restore_mode: ALWAYS_OFF
    on_turn_on:
      then:
        - switch.turn_on: display_state
        - globals.set: 
            id: alarm_timeout
            value: '0'
    on_turn_off:
      then:
        - rtttl.stop
    web_server:
      sorting_group_id: alarm_control

  - platform: template
    name: "Buzzer with alarm"
    id: alarm_buzzer
    optimistic: True
    entity_category: config
    icon: mdi:alarm-note
    web_server:
      sorting_group_id: alarm_config
    restore_mode: RESTORE_DEFAULT_OFF

    # Alarm switches. Keep at restore_mode: DISABLED. The global variable is stored to flash
    # Setting the restore mode to something else will override the stored value of the global
    # variable.
  - platform: template
    name: "Monday alarm"
    lambda: "return id(alarm_on)[1];"
    icon: mdi:alarm
    turn_on_action:
      - lambda: "id(alarm_on)[1] = true; id(recalculate).press();"
    turn_off_action:
      - lambda: "id(alarm_on)[1] = false; id(recalculate).press();"
      - lambda: "id(alarm_on_once)[1] = false;"
    web_server:
      sorting_weight: 11
