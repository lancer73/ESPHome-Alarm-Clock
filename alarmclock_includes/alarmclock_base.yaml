binary_sensor:
  # Button down: Decrease alarm time when time is shown, silence alarm at alarm time set button left to true else
  - platform: template
    id: btn_down
    internal: True
    name: "Button Down"
    lambda: |-
      return (id(source_sensor).state > ${down_min} && id(source_sensor).state < ${down_max});
    on_press:
      then:
        - globals.set:
            id: disp_timeout
            value: '0'
        - lambda: |-
            auto time = id(esptime).now();
            auto ret_call = id(disp_return).make_call();
            auto on_call = id(on_before).make_call();
            auto off_call = id(off_after).make_call();
            auto timeout_call = id(alarm_off).make_call();   
            auto mymelody_call = id(mymelody).make_call();         
            auto displayfont_call = id(displayfont).make_call();         

            int thisday = (id(disp_line) + time.day_of_week - 2) % 7;
            if (id(alarm_state).state || id(alert_now).state) {
              id(alarm_state).turn_off();
              id(alert_now).turn_off();
              if (id(message_line).state != "") {
                id(disp_line) = 1;
              }
            } else {
              switch(id(disp_line)) {
              case 2:
              case 3:
              case 4:
              case 5:
              case 6:
              case 7:
              case 8:
                id(alarm_minute)[thisday] = id(alarm_minute)[thisday] - 5;
                if (id(alarm_minute)[thisday] < 0) {
                  id(alarm_minute)[thisday] = 55;
                  id(alarm_hour)[thisday]--;
                  if (id(alarm_hour)[thisday] < 0) {
                    id(alarm_hour)[thisday] = 23;
                  }
                }
                break;
              case 101:
                id(time_changed) = true;
                id(current_minute)--;
                if (id(current_minute) < 0) {
                  id(current_minute) = 59;
                  id(current_hour)--;
                  if (id(current_hour) < 0) {
                    id(current_hour) = 23;
                  }
                }
                break;
              case 102:
                id(time_changed) = true;
                id(current_year)--;
                if (id(current_year) < 2026) {
                  id(current_year) = 2200;
                }
              case 103:
                id(time_changed) = true;
                id(current_day)--;
                if (id(current_day) < 1) {
                  id(current_month)--;
                  if (id(current_month) < 1) {
                    id(current_month) = 12;
                  }
                  id(current_day) = id(max_days)[id(current_month) - 1];
                }
                break;
              case 104:
                id(display_onoff_minute)[0] = id(display_onoff_minute)[0] - 5;
                if (id(display_onoff_minute)[0] < 0) {
                  id(display_onoff_minute)[0] = 55;
                  id(display_onoff_hour)[0]--;
                  if (id(display_onoff_hour)[0] < 0) {
                    id(display_onoff_hour)[0] = 23;
                  }
                }
                break;
              case 105:
                id(display_onoff_minute)[1] = id(display_onoff_minute)[1] - 5;
                if (id(display_onoff_minute)[1] < 0) {
                  id(display_onoff_minute)[1] = 55;
                  id(display_onoff_hour)[1]--;
                  if (id(display_onoff_hour)[1] < 0) {
                    id(display_onoff_hour)[1] = 23;
                  }
                }
                break;
              case 106:
                ret_call.number_decrement(true);
                ret_call.perform();
                break;
              case 107:
                on_call.number_decrement(true);
                on_call.perform();
                break;
              case 108:
                off_call.number_decrement(true);
                off_call.perform();
                break;
              case 109:
                displayfont_call.number_decrement(true);
                displayfont_call.perform();
                break;              
              case 110:
                timeout_call.number_decrement(true);
                timeout_call.perform();
                break;
              case 111:
                id(buzzer_pwm).stop();
                mymelody_call.number_decrement(true);
                mymelody_call.perform();
                break;
              default:
                if (id(updown_onoff).state) {
                  id(display_state).toggle();
                } else {
                  id(btn_left) = true;
                }
                break;
              }
            }
    on_release:
      then:
        - lambda: "id(btn_left) = false;"
    filters:
      - autorepeat:
          - delay: 500ms
            time_on: 250ms
            time_off: 250ms
          - delay: 5000ms
            time_on: 100ms
            time_off: 100ms

  # Button up: Increase alarm time when time is shown, silence alarm at alarm time set button right to true else
  - platform: template
    id: btn_up
    name: "Button Up"
    internal: True
    lambda: |-
      return (id(source_sensor).state > ${up_min} && id(source_sensor).state <= ${up_max});
    on_press:
      then:
        - globals.set:
            id: disp_timeout
            value: '0'
        - lambda: |-
            auto time = id(esptime).now();
            auto ret_call = id(disp_return).make_call();
            auto on_call = id(on_before).make_call();
            auto off_call = id(off_after).make_call();
            auto timeout_call = id(alarm_off).make_call();
            auto mymelody_call = id(mymelody).make_call();
            auto displayfont_call = id(displayfont).make_call();

            int thisday = (id(disp_line) + time.day_of_week - 2) % 7;
            if (id(alarm_state).state || id(alert_now).state) {
              id(alarm_state).turn_off();
              id(alert_now).turn_off();
              if (id(message_line).state != "") {
                id(disp_line) = 1;
              }
            } else {
              switch(id(disp_line)) {
              case 2:
              case 3:
              case 4:
              case 5:
              case 6:
              case 7:
              case 8:
                id(alarm_minute)[thisday] = id(alarm_minute)[thisday] + 5;
                if (id(alarm_minute)[thisday] > 55) {
                  id(alarm_minute)[thisday] = 0;
                  id(alarm_hour)[thisday]++;
                  if (id(alarm_hour)[thisday] > 23) {
                    id(alarm_hour)[thisday] = 0;
                  }
                }
                break;
              case 101:
                id(time_changed) = true;
                id(current_minute)++;
                if (id(current_minute) > 59) {
                  id(current_minute) = 0;
                  id(current_hour)++;
                  if (id(current_hour) > 23) {
                    id(current_hour) = 0;
                  }
                }
                break;
              case 102:
                id(time_changed) = true;
                id(current_year)++;
                if (id(current_year) > 2200) {
                  id(current_year) = 2026;
                }
                break;
              case 103:
                id(time_changed) = true;
                id(current_day)++;
                if (id(current_day) > id(max_days)[id(current_month) - 1]) {
                  id(current_month)++;
                  if (id(current_month) > 12) {
                    id(current_month) = 1;
                  }
                  id(current_day) = 1;
                }
              case 104:
                id(display_onoff_minute)[0] = id(display_onoff_minute)[0] + 5;
                if (id(display_onoff_minute)[0] > 55) {
                  id(display_onoff_minute)[0] = 0;
                  id(display_onoff_hour)[0]++;
                  if (id(display_onoff_hour)[0] > 23) {
                    id(display_onoff_hour)[0] = 0;
                  }
                }
                break;
              case 105:
                id(display_onoff_minute)[1] = id(display_onoff_minute)[1] + 5;
                if (id(display_onoff_minute)[1] > 55) {
                  id(display_onoff_minute)[1] = 0;
                  id(display_onoff_hour)[1]++;
                  if (id(display_onoff_hour)[1] > 23) {
                    id(display_onoff_hour)[1] = 0;
                  }
                }
                break;
              case 106:
                ret_call.number_increment(true);
                ret_call.perform();
                break;
              case 107:
                on_call.number_increment(true);
                on_call.perform();
                break;
              case 108:
                off_call.number_increment(true);
                off_call.perform();
                break;
              case 109:
                displayfont_call.number_increment(true);
                displayfont_call.perform();
                break;
              case 110:
                timeout_call.number_increment(true);
                timeout_call.perform();
                break;
              case 111:
                id(buzzer_pwm).stop();
                mymelody_call.number_increment(true);
                mymelody_call.perform();
                break;
              default:
                if (id(updown_onoff).state) {
                  id(display_state).toggle();
                } else {
                  id(btn_right) = true;
                }
                break;
              }
            }
    on_release:
      then:
        - lambda: "id(btn_right) = false;"
    filters:
      - autorepeat:
          - delay: 500ms
            time_on: 250ms
            time_off: 250ms
          - delay: 5000ms
            time_on: 100ms
            time_off: 100ms
            
  # Button OnOff: Toggle the alarm and alarm_once on doubleclick, silence alarm at alarm time toggle display else.
  - platform: template
    id: btn_onoff
    name: "Button OnOff"
    internal: True
    lambda: |-
      return (id(source_sensor).state > ${onoff_min} && id(source_sensor).state <= ${onoff_max});
    on_multi_click:
    - timing:
        - ON for at most 1.5s
      then:
        - globals.set:
            id: disp_timeout
            value: '0'
        - lambda: |-
            ESPTime now = id(esptime).now();
            ESPTime utcnow = id(esptime).utcnow();
            int thisday = (id(disp_line) + now.day_of_week - 2) % 7;

            // Helper function to convert decimal to BCD
            auto dec_to_bcd = [](uint8_t val) -> uint8_t {
              return ((val / 10) << 4) | (val % 10);
            };
 
            // Convert to BCD                                                                                                                                                             
            uint8_t bcd_seconds = dec_to_bcd(utcnow.second);                                                                                                                                          
            uint8_t bcd_minutes = dec_to_bcd(utcnow.minute);                                                                                                                         
            uint8_t bcd_hours = dec_to_bcd(utcnow.hour);                                                                                                               
            uint8_t bcd_day_of_week = dec_to_bcd(utcnow.day_of_week);                                                                                                                     
            uint8_t bcd_day_of_month = dec_to_bcd(utcnow.day_of_month);                                                                                                                   
            uint8_t bcd_month = dec_to_bcd(utcnow.month);                                                                                                                                 
            uint8_t bcd_year = dec_to_bcd(utcnow.year - 2000);                                                                                                                            
            uint8_t start_addr = 0x00;

            if (id(alarm_state).state || id(alert_now).state) {
              id(alarm_state).turn_off();
              id(alert_now).turn_off();
              if (id(message_line).state != "") {
                id(disp_line) = 1;
              }
            } else {
              if (id(buzzer_pwm).is_playing()) {
                id(buzzer_pwm).stop();
              }
              
              switch(id(disp_line)) {
              case 0:
                id(display_state).toggle();
                break;
              case 1:
                id(display_state).toggle();
                break;
              case 100:
                if (id(wifi_enabled)) {
                  id(wifi_enabled) = false;
                  id(updown_onoff).turn_off();
                  id(clock_wifi).disable();
                } else {
                  id(wifi_enabled) = true;
                  id(clock_wifi).enable();
                }
                break;
              case 101:
                if (id(time_changed)) {
                  int time_offset = now.hour - utcnow.hour;

                  // Convert to BCD
                  uint8_t bcd_seconds = dec_to_bcd(0);
                  uint8_t bcd_minutes = dec_to_bcd(id(current_minute));
                  uint8_t bcd_hours = dec_to_bcd(id(current_hour) - time_offset);

                  // Create a buffer with the time data
                  uint8_t time_data[7] = {bcd_seconds,bcd_minutes,bcd_hours,bcd_day_of_week,bcd_day_of_month,bcd_month,bcd_year};

                  auto err = id(my_ds1307).write_register(start_addr, time_data, 7);
                  if (err != i2c::ERROR_OK) {
                    ESP_LOGE("main", "Failed to write to DS1307: %d", err);
                  } else {
                    ESP_LOGD("main", "Time send to DS1307 %2d:%2d", id(current_hour) - time_offset, id(current_minute));
                  }
                  id(esptime).read_time();
                  id(time_changed) = false;
                }
                break;
              case 102:
                if (id(time_changed)) {
                  int time_offset = now.year - utcnow.year;

                  // Convert to BCD
                  uint8_t bcd_year = dec_to_bcd(id(current_year) - 2000 - time_offset);

                  // Create a buffer with the time data
                  uint8_t time_data[7] = {bcd_seconds,bcd_minutes,bcd_hours,bcd_day_of_week,bcd_day_of_month,bcd_month,bcd_year};

                  auto err = id(my_ds1307).write_register(start_addr, time_data, 7);
                  if (err != i2c::ERROR_OK) {
                    ESP_LOGE("main", "Failed to write to DS1307: %d", err);
                  } else {
                    ESP_LOGD("main", "Time send to DS1307 %d", id(current_year) - time_offset);
                  }
                  id(esptime).read_time();
                  id(time_changed) = false;
                }
                break;
              case 103:
                if (id(time_changed)) {
                  int time_offset_m = now.month - utcnow.month;                                                                                                                                          
                  int time_offset_d = now.day_of_month - utcnow.day_of_month;

                  // Convert to BCD                                                                                                                                                             
                  uint8_t bcd_month = dec_to_bcd(id(current_month) - time_offset_m);                                                                                                         
                  uint8_t bcd_day_of_month = dec_to_bcd(id(current_day) - time_offset_d);                                                                                                         
                                                                                                                                            
                  // Create a buffer with the time data                                                                                                                                         
                  uint8_t time_data[7] = {bcd_seconds,bcd_minutes,bcd_hours,bcd_day_of_week,bcd_day_of_month,bcd_month,bcd_year};                                                               
 
                  auto err = id(my_ds1307).write_register(start_addr, time_data, 7);
                  if (err != i2c::ERROR_OK) {
                    ESP_LOGE("main", "Failed to write to DS1307: %d", err);
                  } else {
                    ESP_LOGD("main", "Time send to DS1307 %2d-%2d", id(current_month) - time_offset_m, id(current_day) - time_offset_d);
                  }
                  id(esptime).read_time();
                  id(time_changed) = false;
                }
                break;
              case 104:
              case 105:
              case 106:
              case 107:
              case 108:
              case 109:
                id(display_onoff).toggle();
                break;
              case 110:
                id(alarm_buzzer).toggle();
                break;
              case 111:
                if (id(buzzer_pwm).is_playing()) {
                  id(buzzer_pwm).stop();
                } else {
                  id(playmymelody) = true;
                }
                break;
              default:
                if (id(alarm_on)[thisday]) {
                  id(alarm_on)[thisday] = false;
                  id(alarm_on_once)[thisday] = false;
                } else {
                  id(alarm_on)[thisday] = true;
                }
                break;
              }
            }
            id(recalculate).press();
    - timing:
        - ON for at least 1.5s
      then:
        - globals.set:
            id: disp_timeout
            value: '0'
        - lambda: |-
            auto time = id(esptime).now();
            int thisday = (id(disp_line) + time.day_of_week - 2) % 7;
            if (id(alarm_state).state || id(alert_now).state) {
              id(alarm_state).turn_off();
              id(alert_now).turn_off();
              if (id(message_line).state != "") {
                id(disp_line) = 1;
              }
            } else {
              switch(id(disp_line)) {
              case 0:
                id(display_state).toggle();
                break;
              case 1:
                id(display_state).toggle();
                break;
              case 100:
              case 101:
              case 102:
              case 103:
                id(display_state).toggle();
                break;
              case 104:
              case 105:
              case 106:
              case 107:
              case 108:
              case 109:
                id(display_onoff).toggle();
                break;
              case 110:
                id(alarm_buzzer).toggle();
                break;
              case 111:
                if (id(playmymelody)) {
                  id(playmymelody) = false;
                } else {
                  id(playmymelody) = true;
                }
                break;
              default:
                if (id(alarm_on)[thisday]) {
                  id(alarm_on_once)[thisday] = false;
                } else {
                  id(alarm_on)[thisday] = true;
                  id(alarm_on_once)[thisday] = true;
                }
                break;
              }
            }
            id(recalculate).press();
    
  # Button Display: Walk through the lines, but no IP number, silence alarm at alarm time. Turn of display when off.
  - platform: template
    id: btn_display
    name: "Button Display"
    internal: True
    lambda: |-
      return (id(source_sensor).state >= ${display_min} && id(source_sensor).state < ${display_max});
    on_multi_click:
    - timing:
        - ON for at most 1.5s
      then:
        - globals.set:
            id: disp_timeout
            value: '0'
        - lambda: |-
            if (id(alarm_state).state || id(alert_now).state) {
              id(alarm_state).turn_off();
              id(alert_now).turn_off();
              if (id(message_line).state != "") {
                id(disp_line) = 1;
              }
            } else {
              if (!id(display_state).state) {
                id(display_state).turn_on();
              } else {
                id(disp_line)++;
            #ifndef HAS_TVOC
                if (id(message_line).state == "" && id(disp_line) == 1) {
                  id(disp_line) = 2;
                }
            #endif
                if (id(disp_line) < 100) {
                  if (id(disp_line) > 8) {
                    id(disp_line) = 0;
                  }
                } else {
                  if (id(disp_line) > 111) {
                    id(disp_line) = 0;
                  }
                  if (id(disp_line) == 101) {
                    auto time = id(esptime).now();
                    id(current_hour) = time.hour;
                    id(current_minute) = time.minute;
                    id(time_changed) = false;
                  }
                  if (id(disp_line) == 102) {
                    auto time = id(esptime).now();
                    id(current_year) = time.year;
                    id(time_changed) = false;
                  }
                  if (id(disp_line) == 103) {
                    auto time = id(esptime).now();
                    id(current_month) = time.month;
                    id(current_day) = time.day_of_month;
                    id(time_changed) = false;
                  }
                }
              }
            }
    - timing:
        - ON for at least 1.5s
      then:
        - globals.set:
            id: disp_timeout
            value: '0'
        - globals.set:
            id: disp_line
            value: '100'

  # Expose left and right button actions to HA for followup in automations
  # Binary sensor is only toggled when display does not show an alarm time.
  - platform: template
    name: "Left button"
    lambda: "return id(btn_left);"
    web_server:
      sorting_group_id: alarm_diag

  - platform: template
    name: "Right button"
    lambda: "return id(btn_right);"
    web_server:
      sorting_group_id: alarm_diag

  # Connection to HA. Used at alarm time
  - platform: status
    entity_category: diagnostic
    id: system_status
    name: "Status"
    web_server:
      sorting_group_id: alarm_diag

text_sensor:
