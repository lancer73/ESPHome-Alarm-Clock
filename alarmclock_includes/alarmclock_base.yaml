  - platform: template
    name: "Maximum brightness at"
    id: max_brightness
    optimistic: true
    min_value: 10
    max_value: 100
    unit_of_measurement: lx
    device_class: illuminance
    initial_value: 40
    mode: slider
    restore_value: True
