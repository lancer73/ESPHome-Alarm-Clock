    name: "Display on before alarm"
    id: on_before
    optimistic: True
    min_value: 0
    max_value: 120
    step: 1
    initial_value: 0
    mode: slider
    restore_value: True
    icon: mdi:clock-start
    entity_category: config
    device_class: duration
    unit_of_measurement: m
    web_server:
      sorting_group_id: alarm_config

  - platform: template
    name: "Display off after alarm"
    id: off_after
    optimistic: True
    min_value: 0
    max_value: 120
    step: 1
    initial_value: 0
    mode: slider
    restore_value: True
    icon: mdi:clock-end
    entity_category: config
    device_class: duration
    unit_of_measurement: m
    web_server:
      sorting_group_id: alarm_config

  - platform: template
