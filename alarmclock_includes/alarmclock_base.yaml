# Enable the wifi if such is configured
esphome:
  on_boot:
    - priority: 250
      then: 
        - if:
            condition:
              lambda: 'return id(clock_wifi);'
            then:
              wifi.enable:
    - priority: 800
      then:
        - ds1307.read_time:
        - text_sensor.template.publish:
            id: message_line
            state: ""

api:
  services:
  - service: publish_message
    variables:
      message: string
    then:
      - text_sensor.template.publish:
          id: message_line
          state: !lambda 'return message;'
          
# Enable the webserver and create groups for the dashboard
# The webserver is for control purposes. No OTA and no LOG
# Run fully local.
web_server:
  port: 80
  version: 3
  local: True
  sorting_groups:
    - id: alarm_time
      name: "Alarm times"
      sorting_weight: 10
    - id: alarm_control
      name: "Control"
      sorting_weight: 20
    - id: alarm_environment
      name: "Environment"
      sorting_weight: 30
    - id: alarm_config
      name: "Alarm configuration"
      sorting_weight: 40
    - id: alarm_diag
      name: "Diagnostics"
      sorting_weight: 50

globals:
  # Which content to show
  - id: disp_line
    type: int
    restore_value: no
    initial_value: "0"
  # To set the brightness of the MAX7219. Needs to be between 0 and 15
  - id: disp_brightness
    type: int
    restore_value: no
    initial_value: "0"
  # Automatic turning on and off of the display
  - id: display_onoff_hour
    type: int[2]
    restore_value: yes
    initial_value: '{7,23}'
  - id: display_onoff_minute
    type: int[2]
    restore_value: yes
    initial_value: '{0,0}'
  # Alarm times. One for every day of the week
  # The hour the alarm needs to sound
  - id: alarm_hour
    type: int[7]
    restore_value: yes
    initial_value: '{7,7,7,7,7,7,7}'
  # The Minute the alarm needs to sound
  - id: alarm_minute
    type: int[7]
    restore_value: yes 
    initial_value: '{0,0,0,0,0,0,0}'
  # Alarm enable/disable
  - id: alarm_on
    type: bool[7]
    restore_value: yes
    initial_value: '{false,false,false,false,false,false,false}'
  # If this is enabled the alarm will sound and then disable itself
  - id: alarm_on_once
    type: bool[7]
    restore_value: yes
    initial_value: '{false,false,false,false,false,false,false}'
  # If this counter reaches 0 the display switches back to line 0. Set in seconds
  - id: disp_timeout
    type: int
    initial_value: "0"
    restore_value: no
  # Wether the left button (down) is pressed
  - id: btn_left
    type: bool
    restore_value: no
    initial_value: "false"
  # Wether the right button (up) is pressed
  - id: btn_right
    type: bool
    restore_value: no
    initial_value: "false"
  # Time in minutes the alarm is allowed to sound.
  - id: alarm_timeout
    type: int
    initial_value: "1420"
    restore_value: no
  # Countdown timer in minutes for the next alarm
  - id: next_alarm
    type: int
    initial_value: "2880"
    restore_value: no
  # We are in the time of that that the display should be off
  - id: offperiod
    type: bool
    initial_value: "false"
    restore_value: no
  # State of the message indicator (blue led or right bottom pixel
  - id: message_state
    type: bool
    restore_value: no
    initial_value: "false"
  # Register needed for setting the hour
  - id: current_hour
    type: int
    initial_value: "0"
    restore_value: no
  # Register for setting the minute
  - id: current_minute
    type: int
    initial_value: "0"
    restore_value: no
  # Register for setting the year
  - id: current_year
    type: int
    initial_value: "0"
    restore_value: no
  # Register for setting the month
  - id: current_month
    type: int
    initial_value: "0"
    restore_value: no
  # Register for setting the day
  - id: current_day
    type: int
    initial_value: "0"
    restore_value: no
  # Register for setting the days per month. Feb-28 is not worth the trouble
  - id: max_days
    type: int[12]
    initial_value: '{31,27,31,30,31,30,31,31,30,31,30,31}'
    restore_value: no
  # Register for detecting if the time setting has changed
  - id: time_changed
    type: bool
    initial_value: "false"
    restore_value: no
  # If wifi must be enabled
  - id: wifi_enabled
    type: bool
    initial_value: "true"
    restore_value: yes
  - id: playmymelody
    type: bool
    initial_value: "false"
    restore_value: no

i2c:
  #ESP32
  sda: ${i2csdapin}
  scl: ${i2csclpin}
  scan: False
  frequency: 400kHz

i2c_device:
  id: my_ds1307
  address: 0x68

spi:
  clk_pin: ${spiclkpin}
  mosi_pin: ${spimospin}

output:
  - platform: ledc
    pin: ${buzzerpin}
    id: buzzer_output

rtttl:
  output: buzzer_output
  id: buzzer_pwm

# Make the alarm times presentable in HA
datetime:
  - platform: template
    type: time
    name: "Display on at"
    entity_category: config
    lambda: |-
      ESPTime time;
      time.hour = id(display_onoff_hour)[0];
      time.minute = id(display_onoff_minute)[0];
      time.second = 0;
      return time;
    set_action:
      then:
        - lambda: |-
            id(display_onoff_hour)[0] = x.hour;
            id(display_onoff_minute)[0] = x.minute;
    web_server:
      sorting_weight: 10
      sorting_group_id: alarm_config

  - platform: template
    type: time
    name: "Display off at"
    entity_category: config
    lambda: |-
      ESPTime time;
      time.hour = id(display_onoff_hour)[1];
      time.minute = id(display_onoff_minute)[1];
      time.second = 0;
      return time;
    set_action:
      then:
        - lambda: |-
            id(display_onoff_hour)[1] = x.hour;
            id(display_onoff_minute)[1] = x.minute;
    web_server:
      sorting_weight: 11
      sorting_group_id: alarm_config

  - platform: template
    type: time
    name: "Monday alarm"
